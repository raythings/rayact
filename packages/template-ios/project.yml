name: RayactIOS
options:
  bundleIdPrefix: com.rayact
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"
targets:
  RayactIOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
        excludes:
          - project.yml
          - README.md
          - package.json
          # RayactEngine.xcframework is linked via `dependencies:` below, not
          # swept in as a source/resource glob — including it here doubles
          # it up (once as a Frameworks build-phase entry, once as a bogus
          # Resources entry) and, worse, without this exclude xcodegen's
          # glob also descends into build-output dirs sitting alongside it.
          - Frameworks
          - .xcode-derived
          - build
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rayact.app
        INFOPLIST_FILE: Info.plist
        ONLY_ACTIVE_ARCH: YES
        ARCHS[sdk=iphonesimulator*]: arm64
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        OTHER_LDFLAGS:
          # RayactEngine.xcframework is a plain static-lib xcframework
          # (-library + -headers, not -framework bundles) — Swift binds to
          # it purely via @_silgen_name, resolved at link time. Linking is
          # done via the `dependencies:` entry below (xcodegen resolves the
          # correct per-slice .a automatically), not raw -l/-L flags. A
          # static archive doesn't carry its own transitive framework deps
          # the way an app target's own link flags do, so those must be
          # listed explicitly here.
          - -framework
          - Metal
          - -framework
          - QuartzCore
          - -framework
          - Security
          # The consumer app target is pure Swift with no C++ sources of its
          # own, so Xcode doesn't auto-link libc++ — but linking a C++
          # static archive (libRayactEngine.a) pulls in __cxa_throw/
          # __gxx_personality_v0/etc, which only libc++ provides.
          - -lc++
      configs:
        Release:
          INFOPLIST_FILE: Info-Release.plist
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: RAYACT_RELEASE
          DEAD_CODE_STRIPPING: YES
          EXCLUDED_SOURCE_FILE_NAMES: "DevClientBridge.swift DevLauncherController.swift DevMenuOverlay.swift DevServerLoader.swift DevShakeDetector.swift ProjectHmrClient.swift RayactDevToolsTransport.swift"
    dependencies:
      - framework: Frameworks/RayactEngine.xcframework
        embed: false
    # RAYACT_AUTOLINKED_MODULES
    preBuildScripts:
      - name: SyncRayactAssets
        script: |
          ASSETS="${PROJECT_DIR}/../rayact-assets"
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          if [ -d "$ASSETS" ]; then
            mkdir -p "$DEST/runtime"
            cp -R "$ASSETS/"* "$DEST/" 2>/dev/null || true
            [ -f "$ASSETS/app.js" ] && cp "$ASSETS/app.js" "$DEST/" || true
            [ -f "$ASSETS/app.qjsbc" ] && cp "$ASSETS/app.qjsbc" "$DEST/" || true
          fi
        basedOnDependencyAnalysis: false
