name: RayactIOS
options:
  bundleIdPrefix: com.rayact

# NOTE: engine source list is intentionally duplicated between the two
# targets below, not shared via a YAML sequence anchor (`- *anchor`) — YAML
# only supports merge-key splicing (`<<:`) for *mappings*, not sequences;
# `- *anchor` where the anchor points to a list embeds that whole list as a
# single nested element (a list-of-lists), which xcodegen silently accepts
# and then compiles zero sources from. Confirmed by direct testing. The
# *settings* anchor below IS a mapping merge and works correctly — keep
# these two source lists in sync by hand when either changes.

_engineSettings: &engineSettings
  SWIFT_VERSION: 5.0
  TARGETED_DEVICE_FAMILY: "1,2"
  GENERATE_INFOPLIST_FILE: NO
  DEVELOPMENT_TEAM: ""
  USE_HEADERMAP: NO
  CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
  CLANG_CXX_LIBRARY: "libc++"
  HEADER_SEARCH_PATHS: "$(inherited) ../../native ../../native/core ../../native/desktop ../../native/ios ../../native/android ../../third_party/raylib-backends/backends/rlmt ../../third_party/raylib-backends/backends/rlmt/platforms ../../third_party/raylib/src ../../third_party/raym3/include ../../third_party/yoga ../../third_party/quickjs ../../third_party/wasm3/source ../../third_party/cssparser"
  USER_HEADER_SEARCH_PATHS: "$(inherited) ../../third_party/raylib-backends/backends/rlmt ../../third_party/raylib-backends/backends/rlmt/platforms ../../third_party/raylib/src ../../third_party/raym3/include ../../third_party/yoga ../../third_party/quickjs ../../third_party/wasm3/source ../../third_party/cssparser"
  OTHER_CFLAGS: "$(inherited) -D_GNU_SOURCE"
  GCC_PREPROCESSOR_DEFINITIONS: "$(inherited) RAYACT_PLATFORM_NET_BACKEND=1 RAYACT_NO_TS=1 RAYACT_IOS=1 RAYM3_USE_YOGA=1 RAYLIB_USE_RLMT=1 PLATFORM_IOS_METAL=1"

targets:
  RayactIOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
        excludes:
          - project.yml
          - README.md
          - .gitignore
          - Info.plist
          - RayactIOS.xcodeproj
          - RayactIOSBridge.mm
          # Build output dirs live under this source path; globbing them pulls
          # intermediates (.o/.dia/.dylib) in as sources → "duplicate output file".
          - .xcode-derived
          - build
      - path: ../../native/core
        excludes:
          - "*.hpp"
      - path: ../../native/shared
        excludes:
          - "*.h"
          - test_rayactpack.cpp
      - path: ../../native/desktop
        excludes:
          - main.cpp
          - platform_wayland.cpp
          - platform.cpp
          - mac_text_input.mm
          - mac_text_input.hpp
          - platform_mac.mm
          - platform_mac.hpp
          - platform_windows.cpp
          - platform_windows.hpp
          - raylib_bridge.cpp
          - raylib_bridge.hpp
          - engine_runtime.cpp
          - engine_runtime.hpp
          - engine_thread.hpp
          - window_manager.hpp
          - main_new.cpp
          - net.cpp
          # Desktop-only libcurl/mDNS implementations. iOS provides these
          # transports through RayactMobileNetwork.swift.
          - desktop_dev_loader.cpp
          - desktop_dev_loader.hpp
          - desktop_mdns.cpp
          - desktop_mdns.hpp
          - utils/TypeStripper.cpp
          - utils/ScriptValidator.cpp
          - CMakeLists.txt
          - build
          - build-*
          - build-*/**
      - path: ../../native/android
        includes:
          - engine_runtime.cpp
      - path: ../../native/ios
        excludes:
          - engine_runtime.cpp
          - engine_runtime.hpp
      - path: ../../third_party/wasm3/source
        excludes:
          - CMakeLists.txt
          - m3_api_*.c
          - m3_api_*.h
          - m3_bind.h
          - m3_code.h
          - m3_compile.h
          - m3_core.h
          - m3_env.h
          - m3_exception.h
          - m3_exec.h
          - m3_exec_defs.h
          - m3_function.h
          - m3_info.h
          - m3_math_utils.h
          - m3_module.h
          - m3_parse.h
          - m3_config.h
          - m3_config_platforms.h
          - wasm3.h
          - wasm3_defs.h
          - build
      - path: ../../third_party/cssparser/cssparser
        excludes:
          - main.cpp
          - "*.h"
      - path: ../../third_party/quickjs
        excludes:
          - "*.h"
          - "*.js"
          - "*.md"
          - "*.txt"
          - api-test.c
          - cxxtest.cc
          - ctest.c
          - fuzz.c
          - qjs.c
          - qjsc.c
          - qjs-wasi-reactor.c
          - run-test262.c
          - unicode_gen.c
          - lre-test.c
          - build
          - build-*
          - build-*/**
          - docs
          - examples
          - gen
          - patches
          - tests
          - .git
          - .github
          - Makefile
          - CMakeLists.txt
          - meson.build
          - meson_options.txt
          - .gitignore
          - .gitattributes
          - .gitmodules
          - README.md
          - LICENSE
          - update-version.sh
          - test262
      - path: ../../third_party/raym3/src
        excludes:
          - main.cpp
          - examples
          - build
      - path: ../../third_party/raylib/src
        includes:
          - rshapes.c
          - rtextures.c
          - rtext.c
          - rmodels.c
      - path: ../../third_party/yoga/yoga
        excludes:
          - "*.h"
          - CMakeLists.txt
          - module.modulemap
      - path: ../../third_party/raylib-backends/backends/rlmt
        excludes:
          - rlgl.h
          - rlmt.h
          - platforms
      - path: ../../third_party/raylib-backends/backends/rlmt/platforms
        excludes:
          - rcore_desktop_glfw.c
          - rcore_ios_metal.c
      - path: ../../third_party/raylib-backends/backends/rlmt/platforms
        includes:
          - rcore_ios_metal_overlay.c
      - path: ../../packages/rayact-mmkv/native
        includes:
          - mmkv_plugin.cpp
      - path: ../../packages/rayact-secure-store/native
        includes:
          - secure_store_plugin.cpp
          - secure_store_mac.mm
      - path: ../../packages/rayact-crash-reporter/native
        includes:
          - crash_reporter_plugin.cpp
    resources:
      - path: ../../resources/fonts
      - path: Assets.xcassets
    settings:
      base:
        <<: *engineSettings
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rayact.app
        PRODUCT_NAME: Rayact
        OTHER_LDFLAGS: "$(inherited) -framework Metal -framework QuartzCore -framework UIKit -framework CoreFoundation -framework Security"
      configs:
        Debug:
          OTHER_CFLAGS: "$(inherited) -DRAYACT_ENABLE_DEVTOOLS=1"
        Release:
          INFOPLIST_FILE: Info-Release.plist
          OTHER_CFLAGS: "$(inherited) -DRAYACT_ENABLE_DEVTOOLS=0 -DRAYACT_RELEASE_HOST=1"
          EXCLUDED_SOURCE_FILE_NAMES: "devtools.cpp cdp_handler.cpp dev_client_bridge.cpp desktop_dev_loader.cpp desktop_mdns.cpp DevClientBridge.swift DevLauncherController.swift DevMenuOverlay.swift DevServerLoader.swift DevShakeDetector.swift ProjectHmrClient.swift RayactDevToolsTransport.swift"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: RAYACT_RELEASE
          DEAD_CODE_STRIPPING: YES
    preBuildScripts:
      - name: Generate iOS Metal overlay
        script: |
          set -eu
          ROOT="${SRCROOT}/../../.."
          "${ROOT}/rayact/third_party/raylib-backends/scripts/generate_ios_metal_overlay.sh" "${ROOT}/rayact/third_party/raylib" "${ROOT}/rayact/third_party/raylib-backends/backends/rlmt/platforms/rcore_ios_metal_overlay.c" "${ROOT}/rayact/third_party/raylib-backends"
    postBuildScripts:
      - name: Copy bundled runtime assets
        script: |
          set -eu
          SOURCE="${SRCROOT}/../../apps/android/app/src/main/assets/runtime"
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/runtime"
          rm -rf "${DEST}"
          mkdir -p "${DEST}"
          ditto "${SOURCE}" "${DEST}"
          APPJS="${SRCROOT}/../../apps/android/app/src/main/assets/app.js"
          if [ -f "${APPJS}" ]; then
            cp "${APPJS}" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/app.js"
          fi
          APPQJSBC="${SRCROOT}/../../apps/android/app/src/main/assets/app.qjsbc"
          if [ -f "${APPQJSBC}" ]; then
            cp "${APPQJSBC}" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/app.qjsbc"
          fi

  RayactEngineStatic:
    type: library.static
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ../../native/core
        headerVisibility: project
        excludes:
          - "*.hpp"
      - path: ../../native/shared
        headerVisibility: project
        excludes:
          - "*.h"
          - test_rayactpack.cpp
      - path: ../../native/desktop
        headerVisibility: project
        excludes:
          - main.cpp
          - platform_wayland.cpp
          - platform.cpp
          - mac_text_input.mm
          - mac_text_input.hpp
          - platform_mac.mm
          - platform_mac.hpp
          - platform_windows.cpp
          - platform_windows.hpp
          - raylib_bridge.cpp
          - raylib_bridge.hpp
          - engine_runtime.cpp
          - engine_runtime.hpp
          - engine_thread.hpp
          - window_manager.hpp
          - main_new.cpp
          - net.cpp
          - desktop_dev_loader.cpp
          - desktop_dev_loader.hpp
          - desktop_mdns.cpp
          - desktop_mdns.hpp
          - utils/TypeStripper.cpp
          - utils/ScriptValidator.cpp
          - CMakeLists.txt
          - build
          - build-*
          - build-*/**
      - path: ../../native/android
        headerVisibility: project
        includes:
          - engine_runtime.cpp
      - path: ../../native/ios
        headerVisibility: project
        excludes:
          - engine_runtime.cpp
          - engine_runtime.hpp
          - ios_plugins_register.cpp
      - path: ../../third_party/wasm3/source
        headerVisibility: project
        excludes:
          - CMakeLists.txt
          - m3_api_*.c
          - m3_api_*.h
          - m3_bind.h
          - m3_code.h
          - m3_compile.h
          - m3_core.h
          - m3_env.h
          - m3_exception.h
          - m3_exec.h
          - m3_exec_defs.h
          - m3_function.h
          - m3_info.h
          - m3_math_utils.h
          - m3_module.h
          - m3_parse.h
          - m3_config.h
          - m3_config_platforms.h
          - wasm3.h
          - wasm3_defs.h
          - build
      - path: ../../third_party/cssparser/cssparser
        headerVisibility: project
        excludes:
          - main.cpp
          - "*.h"
      - path: ../../third_party/quickjs
        headerVisibility: project
        excludes:
          - "*.h"
          - "*.js"
          - "*.md"
          - "*.txt"
          - api-test.c
          - cxxtest.cc
          - ctest.c
          - fuzz.c
          - qjs.c
          - qjsc.c
          - qjs-wasi-reactor.c
          - run-test262.c
          - unicode_gen.c
          - lre-test.c
          - build
          - build-*
          - build-*/**
          - docs
          - examples
          - gen
          - patches
          - tests
          - .git
          - .github
          - Makefile
          - CMakeLists.txt
          - meson.build
          - meson_options.txt
          - .gitignore
          - .gitattributes
          - .gitmodules
          - README.md
          - LICENSE
          - update-version.sh
          - test262
      - path: ../../third_party/raym3/src
        headerVisibility: project
        excludes:
          - main.cpp
          - examples
          - build
      - path: ../../third_party/raylib/src
        headerVisibility: project
        includes:
          - rshapes.c
          - rtextures.c
          - rtext.c
          - rmodels.c
      - path: ../../third_party/yoga/yoga
        headerVisibility: project
        excludes:
          - "*.h"
          - CMakeLists.txt
          - module.modulemap
      - path: ../../third_party/raylib-backends/backends/rlmt
        headerVisibility: project
        excludes:
          - rlgl.h
          - rlmt.h
          - platforms
      - path: ../../third_party/raylib-backends/backends/rlmt/platforms
        headerVisibility: project
        excludes:
          - rcore_desktop_glfw.c
          - rcore_ios_metal.c
      - path: ../../third_party/raylib-backends/backends/rlmt/platforms
        headerVisibility: project
        includes:
          - rcore_ios_metal_overlay.c
    settings:
      base:
        <<: *engineSettings
        PRODUCT_NAME: RayactEngine
        SKIP_INSTALL: NO
      configs:
        Debug:
          OTHER_CFLAGS: "$(inherited) -DRAYACT_ENABLE_DEVTOOLS=1"
        Release:
          OTHER_CFLAGS: "$(inherited) -DRAYACT_ENABLE_DEVTOOLS=0 -DRAYACT_RELEASE_HOST=1"
          EXCLUDED_SOURCE_FILE_NAMES: "devtools.cpp cdp_handler.cpp dev_client_bridge.cpp desktop_dev_loader.cpp desktop_mdns.cpp"
