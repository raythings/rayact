<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rayact (Web / WebGPU)</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #12121a; color: #ddd; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { overflow: hidden; }
    #wrap { position: fixed; inset: 0; display: grid; place-items: center; }
    canvas {
      background: #000;
      display: block;
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
    }
    #unsupported {
      display: none;
      max-width: 560px;
      margin: 24px;
      padding: 20px;
      border: 1px solid #363646;
      border-radius: 8px;
      background: #191923;
      color: #f3f3f7;
      line-height: 1.45;
    }
    #unsupported h1 { margin: 0 0 8px; font-size: 20px; font-weight: 650; }
    #unsupported p { margin: 0; color: #c7c7d2; }
    #rayact-loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: #12121a;
      transition: opacity 160ms ease;
    }
    #rayact-loading[hidden] { display: none; }
    .rayact-loading-card { display: grid; justify-items: center; gap: 12px; padding: 28px; text-align: center; }
    .rayact-spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #343445;
      border-top-color: #a9c7ff;
      border-radius: 50%;
      animation: rayact-spin 800ms linear infinite;
    }
    .rayact-loading-title { color: #f3f3f7; font-size: 18px; font-weight: 650; }
    .rayact-loading-detail { color: #aaaab8; font-size: 13px; }
    @keyframes rayact-spin { to { transform: rotate(360deg); } }
    body.rayact-unsupported canvas,
    body.rayact-unsupported .rayact-ime,
    body.rayact-unsupported #rayact-loading { display: none; }
    body.rayact-unsupported #unsupported { display: block; }
    .rayact-ime {
      position: fixed;
      left: -1000px;
      top: -1000px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      resize: none;
      border: 0;
      padding: 0;
      outline: 0;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="canvas" width="960" height="540" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
    <input id="rayact-ime-input" class="rayact-ime" autocomplete="off" autocapitalize="none" spellcheck="false">
    <textarea id="rayact-ime-textarea" class="rayact-ime" autocomplete="off" autocapitalize="none" spellcheck="false"></textarea>
    <section id="rayact-loading" role="status" aria-live="polite">
      <div class="rayact-loading-card">
        <div class="rayact-spinner" aria-hidden="true"></div>
        <div class="rayact-loading-title">Preparing project</div>
        <div id="rayact-loading-detail" class="rayact-loading-detail">Loading the initial project files…</div>
      </div>
    </section>
    <section id="unsupported" role="alert" aria-live="polite">
      <h1>WebGPU is not available</h1>
      <p>Rayact Web requires a browser with WebGPU enabled and cross-origin isolation headers. Use a current Chrome or Edge build, then reload this page.</p>
    </section>
  </div>
  <script>
    if (!navigator.gpu) {
      document.body.classList.add('rayact-unsupported');
    }

    // Browsers cannot browse raw mDNS. The web launcher receives the resolved
    // server as ?dev=<origin>; start warming that server immediately, before
    // the WASM runtime has downloaded and initialized.
    var rayactDevMatch = (location.search || '').match(/[?&]dev=([^&]+)/);
    var rayactDevBase = rayactDevMatch
      ? decodeURIComponent(rayactDevMatch[1]).replace(/\/+$/, '')
      : '';
    var rayactPrefetchCache = new Map();
    var rayactPrefetchBytes = 0;
    var rayactPrefetchLimit = 16 * 1024 * 1024;
    var rayactPrefetchFileLimit = 4 * 1024 * 1024;

    function rayactAbsoluteUrl(url) {
      try {
        var resolved = new URL(url, rayactDevBase || location.href);
        if (rayactDevBase && resolved.pathname.indexOf('/rayact/') === 0) {
          var selected = new URL(rayactDevBase);
          resolved.protocol = selected.protocol;
          resolved.hostname = selected.hostname;
          resolved.port = selected.port;
        }
        return resolved.href;
      }
      catch (_) { return url; }
    }

    function rayactCacheResponse(url, bytes, revision) {
      if (!bytes || bytes.byteLength > rayactPrefetchFileLimit) return false;
      if (rayactPrefetchBytes + bytes.byteLength > rayactPrefetchLimit) return false;
      var key = rayactAbsoluteUrl(url);
      if (rayactPrefetchCache.has(key)) return true;
      rayactPrefetchCache.set(key, { bytes: bytes, revision: revision });
      rayactPrefetchBytes += bytes.byteLength;
      return true;
    }

    async function rayactFetchBytes(url) {
      var controller = new AbortController();
      var timeout = setTimeout(function() { controller.abort(); }, 5000);
      try {
        var response = await fetch(rayactAbsoluteUrl(url), {
          cache: 'no-store',
          signal: controller.signal,
        });
        if (!response.ok) throw new Error('HTTP ' + response.status + ' from ' + url);
        return new Uint8Array(await response.arrayBuffer());
      } finally {
        clearTimeout(timeout);
      }
    }

    window.__rayactDevPrefetchReady = rayactDevBase ? (async function() {
      try {
        var manifestUrl = rayactDevBase + '/rayact/manifest.json?platform=web';
        var manifestBytes = await rayactFetchBytes(manifestUrl);
        var manifest = JSON.parse(new TextDecoder().decode(manifestBytes));
        var revision = Number(manifest.revision == null ? -1 : manifest.revision);
        rayactCacheResponse(manifestUrl, manifestBytes, revision);

        var critical = [];
        var assets = [];
        if (manifest.bundleFormat === 'qjsbc' && manifest.bundleUrl) {
          critical.push({ url: manifest.bundleUrl, size: 0 });
        } else {
          if (manifest.bootstrapUrl) critical.push({ url: manifest.bootstrapUrl, size: 0 });
          if (manifest.entryModuleUrl) critical.push({ url: manifest.entryModuleUrl, size: 0 });
        }
        (Array.isArray(manifest.assets) ? manifest.assets.slice(0, 32) : []).forEach(function(asset) {
          var size = Number(asset && asset.size || 0);
          if (asset && asset.url && size >= 0 && size <= rayactPrefetchFileLimit) {
            assets.push({ url: asset.url, size: size });
          }
        });

        async function warmResource(resource) {
          if (resource.size && rayactPrefetchBytes + resource.size > rayactPrefetchLimit) return;
          try {
            var bytes = await rayactFetchBytes(resource.url);
            rayactCacheResponse(resource.url, bytes, revision);
          } catch (error) {
            console.debug('[rayact-web] startup prefetch skipped:', error);
          }
        }

        // Bootstrap and entry are the only pre-run dependency. Assets continue
        // warming opportunistically and can never hold the first frame hostage.
        await Promise.all(critical.map(warmResource));
        void Promise.all(assets.map(warmResource)).then(function() {
          console.log('[rayact-web] prefetched ' + rayactPrefetchCache.size + ' startup files');
        });
      } catch (error) {
        console.warn('[rayact-web] dev prefetch unavailable:', error);
      }
    })() : Promise.resolve();

    var Module = {
      canvas: (function() { return document.getElementById('canvas'); })(),
      print: function(text) { console.log(text); },
      printErr: function(text) { console.error(text); },
      // Consumer bundles: fetch a same-origin app bundle into MEMFS before
      // main() runs, so loadBundledApp() finds /app.qjsbc or /app.js without
      // the bundle being embedded at link time. Missing files are fine (the
      // host falls through to ?dev= or the demo).
      preRun: [function() {
        if (rayactDevBase) {
          addRunDependency('rayact-dev-prefetch');
          Promise.resolve(window.__rayactDevPrefetchReady).finally(function() {
            removeRunDependency('rayact-dev-prefetch');
          });
          return;
        }
        addRunDependency('rayact-app-bundle');
        var tryLoad = function(name, next) {
          fetch(name).then(function(res) {
            if (!res.ok) throw new Error(String(res.status));
            return res.arrayBuffer();
          }).then(function(buf) {
            FS.writeFile('/' + name, new Uint8Array(buf));
            removeRunDependency('rayact-app-bundle');
          }).catch(function() {
            if (next) next(); else removeRunDependency('rayact-app-bundle');
          });
        };
        tryLoad('app.qjsbc', function() { tryLoad('app.js', null); });
      }],
      __rayactPrefetchCache: rayactPrefetchCache,
      __rayactActiveRevision: null,
      __rayactSetLoading: function(visible, detail) {
        var loading = document.getElementById('rayact-loading');
        var detailEl = document.getElementById('rayact-loading-detail');
        if (detailEl && detail) detailEl.textContent = detail;
        if (loading) loading.hidden = !visible;
      }
    };
    window.Module = Module;
    (function() {
      var encoder = new TextEncoder();
      var activeNode = -1;
      var activeEl = null;
      var composing = false;
      var globalImeValue = '';
      var activeBlurOnSubmit = true;
      var canvas = document.getElementById('canvas');
      var lastPointerEventTime = 0;
      var mouseFallbackDown = false;

      // Calling an exported native function before the wasm runtime has
      // finished initializing triggers emscripten's `assert(runtimeInitialized)`
      // which ABORTS the whole module (permanent black screen). The exported
      // wrappers exist on Module immediately, so a `typeof` check is not enough —
      // gate every native call on this readiness flag, set once the runtime is up.
      var runtimeReady = false;
      var prevOnRuntimeInit = Module.onRuntimeInitialized;
      Module.onRuntimeInitialized = function() {
        runtimeReady = true;
        if (typeof prevOnRuntimeInit === 'function') prevOnRuntimeInit();
      };

      function canvasPoint(eventLike) {
        if (!canvas) return null;
        var rect = canvas.getBoundingClientRect();
        if (!rect.width || !rect.height) return null;
        return {
          x: (eventLike.clientX - rect.left) * (canvas.width / rect.width),
          y: (eventLike.clientY - rect.top) * (canvas.height / rect.height)
        };
      }

      function sendPointer(action, eventLike) {
        if (!runtimeReady || typeof Module._rayactWebPointer !== 'function') return;
        var point = canvasPoint(eventLike);
        if (!point) return;
        Module._rayactWebPointer(action, 0, point.x, point.y);
      }

      function sendKey(type, event, text) {
        if (!runtimeReady || typeof Module._rayactWebKey !== 'function') return;
        var keyPtr = stringToNewUTF8(event && event.key || '');
        var codePtr = stringToNewUTF8(event && event.code || '');
        var textPtr = stringToNewUTF8(text || '');
        try {
          Module._rayactWebKey(
            type, keyPtr, codePtr, textPtr,
            event && event.repeat ? 1 : 0, event && event.ctrlKey ? 1 : 0,
            event && event.altKey ? 1 : 0, event && event.shiftKey ? 1 : 0,
            event && event.metaKey ? 1 : 0
          );
        } finally {
          _free(keyPtr); _free(codePtr); _free(textPtr);
        }
      }

      if (canvas) {
        canvas.style.touchAction = 'none';
        canvas.addEventListener('pointerdown', function(event) {
          lastPointerEventTime = Date.now();
          canvas.focus({ preventScroll: true });
          canvas.setPointerCapture(event.pointerId);
          sendPointer(0, event);
          event.preventDefault();
        });
        canvas.addEventListener('pointermove', function(event) {
          lastPointerEventTime = Date.now();
          sendPointer(2, event);
          event.preventDefault();
        });
        canvas.addEventListener('pointerup', function(event) {
          lastPointerEventTime = Date.now();
          sendPointer(1, event);
          if (canvas.hasPointerCapture && canvas.hasPointerCapture(event.pointerId)) {
            canvas.releasePointerCapture(event.pointerId);
          }
          event.preventDefault();
        });
        canvas.addEventListener('pointercancel', function(event) {
          lastPointerEventTime = Date.now();
          sendPointer(1, event);
          event.preventDefault();
        });
        canvas.addEventListener('keydown', function(event) {
          if (activeNode !== -1) return;
          sendKey(0, event, '');
          if (!event.ctrlKey && !event.metaKey && !event.altKey && event.key.length === 1) {
            sendKey(2, event, event.key);
          }
          if (['Tab', 'Backspace', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(event.key)) {
            event.preventDefault();
          }
        });
        canvas.addEventListener('keyup', function(event) {
          if (activeNode !== -1) return;
          sendKey(1, event, '');
        });
        canvas.addEventListener('mousedown', function(event) {
          if (Date.now() - lastPointerEventTime < 500) return;
          mouseFallbackDown = true;
          canvas.focus({ preventScroll: true });
          sendPointer(0, event);
          event.preventDefault();
        });
        canvas.addEventListener('mousemove', function(event) {
          if (!mouseFallbackDown || Date.now() - lastPointerEventTime < 500) return;
          sendPointer(2, event);
          event.preventDefault();
        });
        window.addEventListener('mouseup', function(event) {
          if (!mouseFallbackDown || Date.now() - lastPointerEventTime < 500) return;
          mouseFallbackDown = false;
          sendPointer(1, event);
          event.preventDefault();
        });
        canvas.addEventListener('touchstart', function(event) {
          if (Date.now() - lastPointerEventTime < 500 || !event.changedTouches.length) return;
          canvas.focus({ preventScroll: true });
          sendPointer(0, event.changedTouches[0]);
          event.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchmove', function(event) {
          if (Date.now() - lastPointerEventTime < 500 || !event.changedTouches.length) return;
          sendPointer(2, event.changedTouches[0]);
          event.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchend', function(event) {
          if (Date.now() - lastPointerEventTime < 500 || !event.changedTouches.length) return;
          sendPointer(1, event.changedTouches[0]);
          event.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchcancel', function(event) {
          if (Date.now() - lastPointerEventTime < 500 || !event.changedTouches.length) return;
          sendPointer(1, event.changedTouches[0]);
          event.preventDefault();
        }, { passive: false });
      }

      function utf8Offset(value, utf16Offset) {
        if (utf16Offset == null || utf16Offset < 0) return -1;
        return encoder.encode(value.slice(0, utf16Offset)).length;
      }

      function sendState(textChanged) {
        if (!runtimeReady || !activeEl || activeNode === -1) return;
        var value = activeEl.value || '';
        if (activeNode === -2) {
          if (composing || !textChanged) return;
          var prefix = 0;
          while (prefix < globalImeValue.length && prefix < value.length &&
                 globalImeValue[prefix] === value[prefix]) prefix++;
          for (var deleted = prefix; deleted < globalImeValue.length; deleted++) {
            sendKey(0, { key: 'Backspace', code: 'Backspace' }, '');
          }
          if (value.length > prefix) sendKey(2, null, value.slice(prefix));
          globalImeValue = value;
          return;
        }
        if (typeof Module._rayactWebImeUpdate !== 'function') return;
        var ptr = stringToNewUTF8(value);
        try {
          Module._rayactWebImeUpdate(
            activeNode,
            ptr,
            utf8Offset(value, activeEl.selectionStart),
            utf8Offset(value, activeEl.selectionEnd),
            composing ? utf8Offset(value, activeEl.selectionStart) : -1,
            composing ? utf8Offset(value, activeEl.selectionEnd) : -1,
            textChanged ? 1 : 0
          );
        } finally {
          _free(ptr);
        }
      }

      function configure(el, opts) {
        el.inputMode = opts.inputMode || 'text';
        el.enterKeyHint = opts.imeAction || 'done';
        el.autocapitalize = opts.autocapitalize || 'sentences';
        el.autocomplete = opts.autocorrect ? 'on' : 'off';
        el.spellcheck = !!opts.autocorrect;
        el.style.webkitUserSelect = opts.contextMenuHidden ? 'none' : '';
        el.style.userSelect = opts.contextMenuHidden ? 'none' : '';
        if (el.tagName === 'INPUT') el.type = opts.secure ? 'password' : 'text';
      }

      function attach(el) {
        el.addEventListener('input', function() { sendState(true); });
        el.addEventListener('select', function() { sendState(false); });
        el.addEventListener('compositionstart', function() { composing = true; sendState(false); });
        el.addEventListener('compositionend', function() { composing = false; sendState(true); });
        el.addEventListener('keydown', function(event) {
          if (event.key === 'Enter' && (el.tagName !== 'TEXTAREA' || activeBlurOnSubmit)) {
            event.preventDefault();
            sendState(true);
            if (activeNode === -2) sendKey(0, event, '');
            else if (runtimeReady && typeof Module._rayactWebImeSubmit === 'function') Module._rayactWebImeSubmit();
          }
        });
      }
      attach(document.getElementById('rayact-ime-input'));
      attach(document.getElementById('rayact-ime-textarea'));
      document.addEventListener('selectionchange', function() {
        if (document.activeElement === activeEl) sendState(false);
      });

      Module.rayactTextInput = {
        show: function(nodeId, value, inputType, autocorrect, secure, imeAction, blurOnSubmit, autoCapitalize, contextMenuHidden) {
          activeNode = nodeId;
          if (nodeId === -2) globalImeValue = value || '';
          activeBlurOnSubmit = !!blurOnSubmit;
          var multiline = inputType === 'multiline';
          activeEl = document.getElementById(multiline ? 'rayact-ime-textarea' : 'rayact-ime-input');
          var inputMode = inputType === 'email' ? 'email'
            : inputType === 'number' ? 'decimal'
            : inputType === 'phone' ? 'tel'
            : inputType === 'url' ? 'url'
            : 'text';
          configure(activeEl, {
            inputMode: inputMode,
            autocorrect: autocorrect,
            secure: secure,
            imeAction: imeAction,
            autocapitalize: autoCapitalize,
            contextMenuHidden: !!contextMenuHidden,
          });
          if (activeEl.value !== value) activeEl.value = value || '';
          var end = activeEl.value.length;
          activeEl.focus({ preventScroll: true });
          activeEl.setSelectionRange(end, end);
        },
        hide: function() {
          if (activeEl) activeEl.blur();
          activeNode = -1;
          activeBlurOnSubmit = true;
          globalImeValue = '';
          activeEl = null;
          composing = false;
          var canvas = document.getElementById('canvas');
          if (canvas) canvas.focus({ preventScroll: true });
        },
        update: function(nodeId, value, selectionStart, selectionEnd) {
          if (!activeEl || activeNode !== nodeId) return;
          if (value != null && activeEl.value !== value) activeEl.value = value;
          function utf16FromBytes(str, bytes) {
            if (bytes == null || bytes < 0) return activeEl.value.length;
            var total = 0;
            for (var i = 0; i < str.length; i++) {
              var cp = str.codePointAt(i);
              var ch = String.fromCodePoint(cp);
              var next = total + encoder.encode(ch).length;
              if (next > bytes) return i;
              total = next;
              if (cp > 0xffff) i++;
            }
            return str.length;
          }
          var start = utf16FromBytes(activeEl.value, selectionStart);
          var end = utf16FromBytes(activeEl.value, selectionEnd);
          activeEl.setSelectionRange(start, end);
        }
      };
    })();
  </script>
  {{{ SCRIPT }}}
</body>
</html>
