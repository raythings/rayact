name: Release train

on:
  workflow_dispatch:
    inputs:
      channel:
        type: choice
        options: [stable, rollback]
        required: true
      version:
        description: Existing preview/GitHub release version
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  candidate:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Prepare canary version
        if: github.ref == 'refs/heads/main'
        run: node scripts/bump-version.mjs "0.0.3-canary.${GITHUB_SHA::12}"
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm test
      - run: npm run test:packages
      - run: node scripts/verify-reproducibility.mjs
      - run: npm audit --audit-level=high
      - name: Pack immutable candidate
        env:
          SOURCE_DATE_EPOCH: ${{ github.event.repository.updated_at }}
          RAYACT_RELEASE_PRIVATE_KEY: ${{ secrets.RAYACT_RELEASE_PRIVATE_KEY }}
        run: |
          npm run pack:release
          node scripts/generate-release-set.mjs --assets release1 --require-signature
          node scripts/verify-release-set.mjs release1
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'release1/*'
      - name: Publish canary
        if: github.ref == 'refs/heads/main'
        run: node scripts/release-channel.mjs canary release1
      - name: Publish preview bits
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/release-channel.mjs preview release1
      - name: Attach exact candidate bits
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with: { files: 'release1/*' }

  promote:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "v${{ inputs.version }}" --dir release1
      - env:
          RAYACT_RELEASE_PUBLIC_KEY: ${{ secrets.RAYACT_RELEASE_PUBLIC_KEY }}
        run: node scripts/verify-release-set.mjs release1
      - run: node scripts/verify-stable-gate.mjs release1
      - run: node scripts/release-channel.mjs "${{ inputs.channel }}" release1
      - if: inputs.channel == 'stable' || inputs.channel == 'rollback'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "v${{ inputs.version }}" --latest
